tags:
  - Text Processing
summary: Proses dan bersihkan teks input
description: >
  Endpoint ini menerima teks dan membersihkannya dari karakter non-alfanumerik
  (hanya menyisakan huruf a-z, A-Z, dan angka 0-9).
consumes:
  - multipart/form-data
parameters:
  - name: text
    in: formData
    type: string
    required: true
    description: Teks yang akan diproses
    example: "Halo, apa kabar???"
responses:
  200:
    description: Teks berhasil diproses
    schema:
      type: object
      properties:
        status_code:
          type: integer
          example: 200
        description:
          type: string
          example: "Teks yang sudah diproses"
        data:
          type: string
          example: "Halo  apa kabar   "
